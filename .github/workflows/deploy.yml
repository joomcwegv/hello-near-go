name: Deploy to NEAR Testnet

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go 1.22
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install TinyGo
      run: |
        wget https://github.com/tinygo-org/tinygo/releases/download/v0.31.2/tinygo_0.31.2_amd64.deb
        sudo dpkg -i tinygo_0.31.2_amd64.deb

    - name: Install NEAR CLI
      run: npm install -g near-cli-rs@latest

    - name: Configure NEAR Credentials
      run: |
        mkdir -p ~/.near-credentials/testnet
        echo '${{ secrets.NEAR_CREDENTIALS }}' > ~/.near-credentials/testnet/auctiontest2026.testnet.json

    - name: Build Smart Contract
      working-directory: ./auction
      run: |
        go mod tidy
        tinygo build -size short -no-debug -panic=trap -scheduler=none -gc=leaking -o auction.wasm -target wasm-unknown ./main.go

    - name: Deploy to NEAR Testnet
      working-directory: ./auction
      run: |
        near contract deploy auctiontest2026.testnet use-file auction.wasm without-init-call network-config testnet sign-with-legacy-keychain send
