name: Deploy to NEAR Testnet

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install near-go CLI
      run: |
        curl -LO https://github.com/vlmoon99/near-cli-go/releases/latest/download/install.sh && bash install.sh && rm install.sh
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Install NEAR CLI
      run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/near/near-cli-rs/releases/latest/download/near-cli-rs-installer.sh | sh

    - name: Verify tools
      run: |
        near-go version
        near --version

    - name: Configure NEAR Credentials
      shell: bash
      run: |
        mkdir -p ~/.near-credentials/testnet
        cat << 'EOF' > ~/.near-credentials/testnet/auctiontest2026.testnet.json
        ${{ secrets.NEAR_CREDENTIALS }}
        EOF

    - name: Build Smart Contract
      working-directory: ./auction
      shell: bash
      run: |
        near-go build
        echo "Build successful! WASM file:"
        ls -la main.wasm

    - name: Deploy to NEAR Testnet
      working-directory: ./auction
      shell: bash
      run: |
        near contract deploy auctiontest2026.testnet use-file main.wasm without-init-call network-config testnet sign-with-legacy-keychain send
